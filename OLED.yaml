i2c:
  sda: GPIO39
  scl: GPIO38
  scan: true

font:
  - file: "gfonts://Roboto Mono"
    id: font_small
    size: 10

  - file: "gfonts://Roboto Mono"
    id: font_big
    size: 14

globals:
  - id: oled_page
    type: int
    initial_value: '0'

interval:
  - interval: 4s
    then:
      - lambda: |-
          id(oled_page) = (id(oled_page) + 1) % 2;

display:
  - platform: ssd1306_i2c
    model: "SSD1306 128x32"
    address: 0x3C
    update_interval: 1s

    lambda: |-
      it.clear();

      // =========================
      // PAGE 1
      // =========================
      if (id(oled_page) == 0) {

        it.printf(64, 10, id(font_small),
          TextAlign::CENTER,
          "D%.0f S%.0f %.0fHz",
          id(dhw_temp).state,
          id(dhw_secondary_temp).state,
          id(compressor_frequency).state
        );

        it.printf(64, 22, id(font_small),
          TextAlign::CENTER,
          "F%.1fL/s R%.0f S%.0f",
          id(flow_rate).state,
          id(z1_return_temp).state,
          id(z1_flow_temp_target).state
        );
      }

      // =========================
      // PAGE 2
      // =========================
      else {

        it.printf(64, 10, id(font_big),
          TextAlign::CENTER,
          "Väljas: %.0f°C",
          id(outside_temp).state
        );
      }
