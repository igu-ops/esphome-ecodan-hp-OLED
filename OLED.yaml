i2c:
  sda: GPIO39
  scl: GPIO38
  scan: true

font:
  - file: "gfonts://Open Sans"
    id: font_small
    size: 12
    glyphs: "!\"%()+=,-_.:ยฐ0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyzรครถรผรตรรรร"

  - file: "gfonts://Open Sans"
    id: font_big
    size: 20
    glyphs: "!\"%()+=,-_.:ยฐ0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyzรครถรผรตรรรร"

globals:
  - id: oled_page
    type: int
    initial_value: '0'

interval:
  - interval: 4s
    then:
      - lambda: |-
          id(oled_page) = (id(oled_page) + 1) % 2;

display:
  - platform: ssd1306_i2c
    model: "SSD1306 128x32"
    address: 0x3C
    update_interval: 1s

    lambda: |-
      it.clear();

      // =========================
      // PAGE 1 โ SYSTEM (2 LINES)
      // =========================
      if (id(oled_page) == 0) {

        // Line 1: temps + compressor
        if (id(dhw_temp).has_state() &&
            id(dhw_secondary_temp).has_state() &&
            id(compressor_frequency).has_state()) {

          it.printf(0, 0, id(font_small),
            "%.1fยฐC %.1fยฐC %.0fHz",
            id(dhw_temp).state,
            id(dhw_secondary_temp).state,
            id(compressor_frequency).state
          );
        } else {
                    TextAlign::CENTER,
          it.printf(0, 0, id(font_big), "Ootel");
        }

        // Line 2: flow + zone temps
it.printf(0, 16, id(font_small),
  "Fl%.0l/sfL%.0fยฐC R%.0fยฐC S%.0fยฐC",
  id(flow_rate).state,
  id(z1_feed_temp).state,
  id(z1_return_temp).state,
  id(z1_flow_temp_target).state
);
          );
        }
      }

      // =========================
      // PAGE 2 โ OUTSIDE (BIG)
      // =========================
      else {

        if (id(outside_temp).has_state()) {
          it.printf(64, 16, id(font_big),
            TextAlign::CENTER,
            "Vรคljas:%.0fยฐC",
            id(outside_temp).state
          );
        } else {
          it.printf(64, 16, id(font_big),
            TextAlign::CENTER,
            "--ยฐC"
          );
        }
      }
