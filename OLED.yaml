i2c:
  sda: GPIO39
  scl: GPIO38
  scan: true

font:
  - file: "gfonts://Open Sans"
    id: font_small
    size: 13
    glyphs: "!\"%()+=,-_.:째/^0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz채철체천횆횜횥횛 "

  - file: "gfonts://Open Sans"
    id: font_big
    size: 22
    glyphs: "!\"%()+=,-_.:째/^0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz채철체천횆횜횥횛 "

globals:
  - id: oled_page
    type: int
    initial_value: '0'

interval:
  - interval: 4s
    then:
      - lambda: |-
          id(oled_page) = (id(oled_page) + 1) % 2;

display:
  - platform: ssd1306_i2c
    model: "SSD1306 128x32"
    address: 0x3C
    update_interval: 1s

    lambda: |-
  it.clear();

  if (id(oled_page) == 0) {
    if (id(dhw_temp).has_state()) {
      
      // Top line: DHW temps + compressor frequency
      it.printf(64, 8, id(font_small),
        TextAlign::CENTER,
        "^%.0f째C v%.0f째C %.0fHz",
        id(dhw_secondary_temp).state,
        id(dhw_temp).state,
        id(compressor_frequency).state
      );

      // Bottom line: flow / z1 flow / target / return 
      it.printf(64, 24, id(font_small),
        TextAlign::CENTER,
        "%.0fL/s F%.0f/%.0f째C R%.0f째C",
        id(flow_rate).state,
        id(z1_feed_temp).state,
        id(z1_flow_temp_target).state,
        id(z1_return_temp).state
      );

    } else {
      // Single-line outside temperature
      if (id(outside_temp).has_state()) {
        it.printf(64, 16, id(font_big),
          TextAlign::CENTER,
          "V채ljas: %.0f째C",
          id(outside_temp).state
        );
      } else {
        it.printf(64, 16, id(font_big),
          TextAlign::CENTER,
          "V채ljas: --째C"
        );
      }
    }
  } else {
    it.printf(64, 16, id(font_big),
      TextAlign::CENTER,
      "Ootel"
    );
  }
