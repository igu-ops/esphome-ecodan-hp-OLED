i2c:
  sda: GPIO38
  scl: GPIO39
  scan: true

font:
  - file: "gfonts://Open Sans"
    id: font_small
    size: 12
    glyphs: "!\"%()+=,-_.:째0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz채철체천횆횜횥횛"

  - file: "gfonts://Open Sans"
    id: font_big
    size: 20
    glyphs: "!\"%()+=,-_.:째0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz채철체천횆횜횥횛"

globals:
  - id: oled_page
    type: int
    initial_value: '0'

interval:
  - interval: 5s
    then:
      - lambda: |-
          id(oled_page) = (id(oled_page) + 1) % 2;

display:
  - platform: ssd1306_i2c
    model: "SSD1306 128x64"
    address: 0x3C
    update_interval: 1s

    lambda: |-
      if (id(oled_page) == 0) {

        if (id(dhw_temp).has_state() &&
            id(dhw_secondary_temp).has_state() &&
            id(compressor_frequency).has_state()) {

          it.printf(0, 0, id(font_small),
            "%.1f째C %.1f째C %.0fHz",
            id(dhw_temp).state,
            id(dhw_secondary_temp).state,
            id(compressor_frequency).state
          );
        } else {
          it.printf(0, 0, id(font_small), "Sensor error");
        }

        if (id(flow_rate).has_state() &&
            id(z1_feed_temp).has_state()) {

          it.printf(0, 14, id(font_small),
            "L %.0f Fl %.0f",
            id(flow_rate).state,
            id(z1_feed_temp).state
          );
        }

        if (id(z1_return_temp).has_state() &&
            id(z1_flow_temp_target).has_state()) {

          it.printf(0, 28, id(font_small),
            "Rt %.0f Sp %.0f",
            id(z1_return_temp).state,
            id(z1_flow_temp_target).state
          );
        }
      }

      else {

        it.printf(0, 10, id(font_big), "V채ljas:");

        if (id(outside_temp).has_state()) {
          it.printf(0, 35, id(font_big),
            "%.0f째C",
            id(outside_temp).state
          );
        } else {
          it.printf(0, 35, id(font_big), "--째C");
        }
      }
