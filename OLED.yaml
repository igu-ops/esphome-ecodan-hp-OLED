i2c:
  sda: GPIO39
  scl: GPIO38
  scan: true

font:
  - file: "gfonts://Open Sans"
    id: font_small
    size: 10
    glyphs: "!\"%()+=,-_.:ยฐ0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyzรครถรผรตรรรร"

  - file: "gfonts://Open Sans"
    id: font_big
    size: 14
    glyphs: "!\"%()+=,-_.:ยฐ0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyzรครถรผรตรรรร"

globals:
  - id: oled_page
    type: int
    initial_value: '0'

interval:
  - interval: 4s
    then:
      - lambda: |-
          id(oled_page) = (id(oled_page) + 1) % 2;

display:
  - platform: ssd1306_i2c
    model: "SSD1306 128x32"
    address: 0x3C
    update_interval: 1s

    lambda: |-
      it.clear();

      // =========================
      // PAGE 1 โ SYSTEM (2 LINES)
      // =========================
      if (id(oled_page) == 0) {

        // LINE 1
        if (id(dhw_temp).has_state() &&
            id(dhw_secondary_temp).has_state() &&
            id(compressor_frequency).has_state()) {

          it.printf(64, 0, id(font_small),
            TextAlign::CENTER,
            "D%.0f S%.0f %.0fHz",
            id(dhw_temp).state,
            id(dhw_secondary_temp).state,
            id(compressor_frequency).state
          );

        } else {
          it.printf(64, 0, id(font_small),
            TextAlign::CENTER,
            "Ootel"
          );
        }

        // LINE 2
        if (id(flow_rate).has_state() &&
            id(z1_return_temp).has_state() &&
            id(z1_flow_temp_target).has_state()) {

          it.printf(64, 16, id(font_small),
            TextAlign::CENTER,
            "F%.1fL/s R%.0f S%.0f",
            id(flow_rate).state,
            id(z1_return_temp).state,
            id(z1_flow_temp_target).state
          );
        }
      }

      // =========================
      // PAGE 2 โ OUTSIDE (1 LINE ONLY)
      // =========================
      else {

        if (id(outside_temp).has_state()) {

          it.printf(64, 16, id(font_big),
            TextAlign::CENTER,
            "Vรคljas: %.0fยฐC",
            id(outside_temp).state
          );

        } else {

          it.printf(64, 16, id(font_big),
            TextAlign::CENTER,
            "Vรคljas: --ยฐC"
          );
        }
      }
