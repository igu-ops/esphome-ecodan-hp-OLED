i2c:
  sda: 39
  scl: 38
  scan: true
  frequency: 100kHz

font:
  - file: "gfonts://Open Sans"
    id: font_small
    size: 14
    glyphs: "!\"%()+=,-_.:째0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz채철체천횆횜횥횛"

  - file: "gfonts://Open Sans"
    id: font_big
    size: 22
    glyphs: "!\"%()+=,-_.:째0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz채철체천횆횜횥횛"
    
globals:
  - id: oled_page
    type: int
    initial_value: '0'

interval:
  - interval: 5s
    then:
      - lambda: |-
          id(oled_page) = (id(oled_page) + 1) % 2;
      - component.update: oled_display

display:
  - platform: ssd1306_i2c
    id: oled_display
    model: "SSD1306 128x32"
    address: 0x3C
    update_interval: never
    auto_clear_enabled: false
    lambda: |-
      it.clear();

      if (!id(dhw_temp).has_state()) {
        it.printf(0, 0, id(font_small), "Ootel...");
        return;
      }

      if (id(oled_page) == 0) {

        it.printf(0, 0, id(font_small), "%.1f %.1f %.0fHz",
          id(dhw_temp).state,
          id(dhw_secondary_temp).state,
          id(compressor_frequency).state
        );

        it.printf(0, 14, id(font_small), "L %.0f Fl %.0f",
          id(flow_rate).state,
          id(z1_feed_temp).state
        );

        it.printf(0, 28, id(font_small), "Rt %.0f Sp %.0f",
          id(z1_return_temp).state,
          id(z1_flow_temp_target).state
        );

      } else {

        it.printf(0, 10, id(font_big), "V채ljas:");
        it.printf(0, 35, id(font_big), "%.0fC",
          id(outside_temp).state
        );

      }
