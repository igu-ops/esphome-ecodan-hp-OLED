i2c:
  sda: GPIO39
  scl: GPIO38
  scan: true

font:
  - file: "gfonts://Open Sans"
    id: font_small2
    size: 13
    glyphs: "!\"%()+=,-_.:°/↑↓0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyzäöüõÄÖÜÕ "

  - file: "gfonts://Open Sans"
    id: font_big2
    size: 22
    glyphs: "!\"%()+=,-_.:°/↑↓0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyzäöüõÄÖÜÕ "
    
font:
  - file: "/config/fonts/DejaVuSans.ttf"
    id: font_small
    size: 13
    glyphs: "!\"%()+=,-_.:°/↑↓0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyzäöüõÄÖÜÕ "
  - file: "/config/fonts/DejaVuSans.ttf"
    id: font_big
    size: 22
    glyphs: "!\"%()+=,-_.:°/↑↓0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyzäöüõÄÖÜÕ "
    
globals:
  - id: oled_page
    type: int
    initial_value: '0'

interval:
  - interval: 4s
    then:
      - lambda: |-
          id(oled_page) = (id(oled_page) + 1) % 2;

display:
  - platform: ssd1306_i2c
    model: "SSD1306 128x32"
    address: 0x3C
    update_interval: 1s

    lambda: |-
      it.clear();

      if (id(oled_page) == 0) {

        it.printf(64, 14, id(font_small),
          TextAlign::CENTER,
          "↑%.0f°C ↓%.0f°C %.0fHz",
          id(dhw_temp).state,
          id(dhw_secondary_temp).state,
          id(compressor_frequency).state
        );

        it.printf(64, 28, id(font_small),
          TextAlign::CENTER,
          "F%.1fL/s R%.0f°C S%.0f°C",
          id(flow_rate).state,
          id(z1_return_temp).state,
          id(z1_flow_temp_target).state
        );
      }

      else {

        if (id(outside_temp).has_state()) {
          it.printf(64, 28, id(font_big),
            TextAlign::CENTER,
            "Väljas: %.0f°C",
            id(outside_temp).state
          );
        } else {
          it.printf(64, 28, id(font_big),
            TextAlign::CENTER,
            "--°C"
          );
        }
      }
