i2c:
  sda: GPIO39
  scl: GPIO38
  scan: true

font:
  - file: "gfonts://Open Sans"
    id: font_small
    size: 12
    glyphs: "!\"%()+=,-_.:ยฐ0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyzรครถรผรตรรรร"

  - file: "gfonts://Open Sans"
    id: font_big
    size: 20
    glyphs: "!\"%()+=,-_.:ยฐ0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyzรครถรผรตรรรร"

globals:
  - id: oled_page
    type: int
    initial_value: '0'

interval:
  - interval: 4s
    then:
      - lambda: |-
          id(oled_page) = (id(oled_page) + 1) % 2;

display:
  - platform: ssd1306_i2c
    model: "SSD1306 128x32"
    address: 0x3C
    update_interval: 1s

    lambda: |-
      it.clear();

      // =========================
      // PAGE 1 โ SYSTEM DASHBOARD
      // =========================
      if (id(oled_page) == 0) {

        // TOP LINE โ temperatures + compressor
        it.printf(64, 0, id(font_small),
          TextAlign::CENTER,
          "D%.0fยฐ S%.0fยฐ %.0fHz",
          id(dhw_temp).state,
          id(dhw_secondary_temp).state,
          id(compressor_frequency).state
        );

        // BOTTOM LINE โ flow + zones (aligned compact)
        it.printf(64, 16, id(font_small),
          TextAlign::CENTER,
          "F%.1f L/s  R%.0fยฐ S%.0fยฐ",
          id(flow_rate).state,
          id(z1_return_temp).state,
          id(z1_flow_temp_target).state
        );
      }

      // =========================
      // PAGE 2 โ OUTSIDE TEMP
      // =========================
      else {

        if (id(outside_temp).has_state()) {

          it.printf(64, 0, id(font_small),
            TextAlign::CENTER,
            "Vรคljas"
          );

          it.printf(64, 20, id(font_big),
            TextAlign::CENTER,
            "%.0fยฐC",
            id(outside_temp).state
          );

        } else {

          it.printf(64, 0, id(font_small),
            TextAlign::CENTER,
            "Vรคljas"
          );

          it.printf(64, 20, id(font_big),
            TextAlign::CENTER,
            "--ยฐC"
          );
        }
      }
