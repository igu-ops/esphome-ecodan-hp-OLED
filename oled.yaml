i2c:
  sda: GPIO39
  scl: GPIO38
  scan: true

font:
  - file: "gfonts://Open Sans"
    id: font_small
    size: 13
    glyphs: "!\"%()+=,-_.:ยฐ/?^0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyzรครถรผรตรรรร "

  - file: "gfonts://Open Sans"
    id: font_big
    size: 22
    glyphs: "!\"%()+=,-_.:ยฐ/?^0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyzรครถรผรตรรรร "

globals:
  - id: oled_page
    type: int
    initial_value: '0'

interval:
  - interval: 3s
    then:
      - lambda: |-
          id(oled_page) = (id(oled_page) + 1) % 2;

display:
  - platform: ssd1306_i2c
    model: "SSD1306 128x32"
    address: 0x3C
    update_interval: 1s

lambda: |-
  it.clear();

  if (id(oled_page) == 0) {

    // Top line
    it.printf(64, 10, id(font_small),
      TextAlign::CENTER,
      "^%.0fยฐC v%.0fยฐC %.0fHz",
      id(dhw_secondary_temp).state,
      id(dhw_temp).state,
      id(compressor_frequency).state
    );   

    // IN1 status indicator
    if (id(ecodan_in1).state) {
      it.print(120, 10, id(font_small), "โ");
    } else {
      it.print(120, 10, id(font_small), "โ");
    }

      // Bottom line
      it.printf(64, 26, id(font_small),
        TextAlign::CENTER,
        "%.0fL/s F%.0f/%.0fยฐC R%.0fยฐC",
        id(flow_rate).state,
        id(z1_feed_temp).state,
        id(z1_flow_temp_target).state,
        id(z1_return_temp).state
      );

  } else {

    if (id(outside_temp).has_state()) {
      it.printf(64, 18, id(font_big),
        TextAlign::CENTER,
        "Vรคljas: %.0fยฐC%s",
        id(outside_temp).state,
        (id(compressor_frequency).state == 0 ? "?" : "")
      );
    } else {
      it.printf(64, 18, id(font_big),
        TextAlign::CENTER,
        "Vรคljas: --ยฐC"
      );
    }

  }
